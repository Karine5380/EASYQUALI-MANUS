services:
  - type: web
    name: coach-formateur-ia-bot
    runtime: docker
    dockerfilePath: ./telegram_coach_bot/Dockerfile
    dockerContext: ./telegram_coach_bot
    plan: free
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false   # À renseigner manuellement dans le dashboard Render
      - key: OPENAI_API_KEY
        sync: false   # À renseigner manuellement dans le dashboard Render
      - key: WEBHOOK_URL
        sync: false   # URL automatique de Render (ex: https://coach-formateur-ia-bot.onrender.com)
      - key: PORT
        value: 8000
    healthCheckPath: /health
    autoDeploy: true
